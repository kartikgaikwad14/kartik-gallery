<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lumina Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <section class="hero">

        <h1>Lumina Gallery</h1>

        <p>A visual journey through premium aesthetics</p>

        <div class="filters">

            <button class="active" data-filter="all">All</button>
            <button data-filter="nature">Nature</button>
            <button data-filter="city">City</button>
            <button data-filter="architecture">Architecture</button>
            <button data-filter="abstract">Abstract</button>

        </div>

    </section>


    <section class="gallery">

        <div class="card nature">
            <img src="https://picsum.photos/600/400?random=1">
        </div>

        <div class="card city">
            <img src="https://picsum.photos/600/400?random=2">
        </div>

        <div class="card architecture">
            <img src="https://picsum.photos/600/400?random=3">
        </div>

        <div class="card abstract">
            <img src="https://picsum.photos/600/400?random=4">
        </div>

        <div class="card nature">
            <img src="https://picsum.photos/600/400?random=5">
        </div>

        <div class="card city">
            <img src="https://picsum.photos/600/400?random=6">
        </div>

        <div class="card architecture">
            <img src="https://picsum.photos/600/400?random=7">
        </div>

        <div class="card abstract">
            <img src="https://picsum.photos/600/400?random=8">
        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
